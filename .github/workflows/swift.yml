# makes sure that code compiles
name: Swift

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          xcodebuild build \
            -project TypingResearch.xcodeproj \
            -scheme TypingResearch \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO

      - name: Test adaptive keyboard core
        run: |
          DESTINATION_ID="$(
            xcrun simctl list devices available -j |
            python3 -c 'import json,sys; data=json.load(sys.stdin)["devices"]; print(next(device["udid"] for runtime in data.values() for device in runtime if "iPhone" in device["name"]))'
          )"
          xcodebuild test \
            -project TypingResearch.xcodeproj \
            -scheme TypingResearch \
            -destination "platform=iOS Simulator,id=${DESTINATION_ID}" \
            CODE_SIGNING_ALLOWED=NO
